name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (e.g. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: MinDraft ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: |
            Install the asset for your platform. Asset names stay stable across releases — `/releases/latest/download/` links in the README always point to the newest build.

            | Platform | Recommended | Alternative |
            | --- | --- | --- |
            | Windows | `MinDraft-windows-x86_64-setup.exe` | `MinDraft-windows-x86_64.msi` |
            | Linux / WSL | `MinDraft-linux-x86_64.AppImage` | `MinDraft-linux-x86_64.deb` |
            | macOS (Apple Silicon) | `MinDraft-darwin-aarch64.dmg` | — |
            | macOS (Intel) | `MinDraft-darwin-x86_64.dmg` | — |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          releaseAssetNamePattern: "MinDraft-[platform]-[arch][setup][ext]"
